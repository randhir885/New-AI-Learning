<script>

    const supabaseUrl =
        "https://ivtnajqtwqxtfocprpwn.supabase.co";

    const supabaseKey =
        "sb_publishable_Z619_GGDp6F1wnz8Mo7SvA_oujM1umh";

    const supabaseClient = supabase.createClient(
        supabaseUrl,
        supabaseKey
    );

    async function loadTrainingData() {

        const { data, error } = await supabaseClient
            .from('trainingdata')
            .select('*')
            .order('id', { ascending: true });

        const container =
            document.getElementById('training-list');

        if (error) {

            console.error(error);

            container.innerHTML = `
                <div class="card">
                    <h3>Error Loading Data</h3>
                    <p>${error.message}</p>
                </div>
            `;

            return;
        }

        if (!data || data.length === 0) {

            container.innerHTML = `
                <div class="card">
                    <h3>No Training Data Found</h3>
                    <p>The table is empty.</p>
                </div>
            `;

            return;
        }

        container.innerHTML = '';

        data.forEach(item => {

            container.innerHTML += `
                <div class="card">

                    <h3>${item.title}</h3>

                    <p>${item.desc || ''}</p>

                    <div class="tech">
                        ${item.tech || ''}
                    </div>

                    <br>

                    <a
                        class="btn"
                        href="${item.link}"
                        target="_blank"
                    >
                        Open Training
                    </a>

                </div>
            `;
        });
    }

    loadTrainingData();

</script>
